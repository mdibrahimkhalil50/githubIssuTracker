<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>github issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="/assets/social.png" type="image/x-icon">
    <!-- google font add -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- used font awesome icon -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
        font-family: "Outfit", sans-serif;
    }
</style>

</head>
<body>
    <!-- <section class="lg:w-[40%] mx-auto  m-4 "> -->
      <section class="min-h-screen max-w-md bg-base-100 mx-auto m-4 ">
        <div class=" mx-auto justify-items-center items-center space-y-2">
        <img class="" src="./assets/github-logo.png" alt="">
        <h1 class="font-bold text-[#1F2937]">GitHub Issues Tracker</h1>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div class=" flex flex-col col-span-full ">
        <fieldset class="fieldset  rounded-box   flex flex-col space-y-1">
  <!-- <legend class="fieldset-legend">Login</legend> -->

  <label class="label text-black font-bold text-[16px]">Username</label>
  <input id="input-userName" class="input w-full h-10 border border-[#E4E4E7] rounded-box" type="text"  placeholder="Enter Username" />

  <label class="label text-black font-bold text-[16px]">Password</label>
  <input id="input-password" class="input w-full h-10 border border-[#E4E4E7] rounded-box" type="password" placeholder="Password" />
</fieldset>

<!--  remember button add -->
<div class="flex items-center gap-2 mt-3">
  <input type="checkbox" class="checkbox checkbox-primary border-5 bg-gray-200 rounded-box" />

  <label class="text-black">Remember me</label>
</div>
<button id="signIn-btn" class="bg-[#4A00FF] text-white px-4 py-2 rounded my-5 font-extrabold text-[16px]">Sign In</button>
 </div>

 <!-- or part -->
<div class="flex items-center gap-3 my-4">
  <hr class="flex-grow border-gray-300">
  <span class="text-black font-semibold">OR</span>
  <hr class="flex-grow border-gray-300">
</div>

<div class="text-center   m-4 w-full rounded-box mx-auto">
  <p class="text-[#64748B]  mb-4">
    Demo Credentials:
  </p>
  <div class="  bg-base-200  p-4 rounded">
    <p>
      <span class="font-bold">Username:</span> admin
    </p>
    <p>
      <span class="font-bold">Password:</span> admin123
    </p>
  </div>
</div>

</section>

<!-- all script connect -->
 <script src="allScript/login.js"></script>
</body>
</html>
