<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>github issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">
</head>
<body>
    <section class="lg:w-[40%] mx-auto  m-4 border-2 border-pink-600">
        <div class=" mx-auto justify-items-center items-center border-sky-300 border-2 space-y-2">
        <img class="" src="./assets/github-logo.png" alt="">
        <h1 class="font-bold text-[#1F2937]">GitHub Issues Tracker</h1>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div class=" flex flex-col col-span-full ">
        <fieldset class="fieldset border-4 border-green-500 rounded-box   flex flex-col space-y-1">
  <!-- <legend class="fieldset-legend">Login</legend> -->

  <label class="label text-black font-bold text-[16px]">Username</label>
  <input class="w-full h-10 border border-[#E4E4E7] rounded-box" type="text" class="input" placeholder="Enter Username" />

  <label class="label text-black font-bold text-[16px]">Password</label>
  <input class="w-full h-10 border-[#E4E4E7] rounded-box" type="password" class="input" placeholder="Password" />
</fieldset>

<!--  remember button add -->
<div class="flex items-center gap-2 mt-3">
  <input type="checkbox" class="checkbox checkbox-primary border-5 bg-gray-200 rounded-box" />

  <label class="text-black">Remember me</label>
</div>
<button class="bg-[#4A00FF] text-white px-4 py-2 rounded my-5 font-extrabold text-[16px]">Sign In</button>
 </div>

 <!-- or part -->
<div class="flex items-center gap-3 my-4">
  <hr class="flex-grow border-gray-300">
  <span class="text-black font-semibold">OR</span>
  <hr class="flex-grow border-gray-300">
</div>

<div class="text-center border-4 border-green-500  m-4 w-full rounded-box mx-auto">
  <p class="text-[#64748B]  mb-4">
    Demo Credentials:
  </p>
  <div class="border border-green-400 bg-base-200  p-4 rounded">
    <p>
      <span class="font-bold">Username:</span> admin
    </p>
    <p>
      <span class="font-bold">Password:</span> admin123
    </p>
  </div>
</div>

</section>
</body>
</html>
