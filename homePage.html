<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home Page</title>
  <!-- DaisyUI -->
    <link
        href="https://cdn.jsdelivr.net/npm/daisyui@5"
        rel="stylesheet"
        type="text/css"
    />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

</head>
<body>
    
       <body class="bg-[#F4F7FE] min-h-screen">

    <nav class="bg-white shadow-sm px-10 py-4 flex justify-between items-center">

        <!-- Left -->
        <div class="flex items-center gap-3">

            <img
                class="w-10 h-10"
                src="../assets/github-logo.png"
                alt=""
            >

            <h1 class="font-bold text-xl">

                GitHub Issues Tracker

            </h1>

        </div>
        <!-- Right -->
        <div class="flex items-center gap-4">

            <!-- Search -->
            <label class="input input-bordered flex items-center gap-2 rounded-full w-72">

                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>

                <input
                    id="searchInput"
                    type="text"
                    class="grow"
                    placeholder="Search Issues...."
                />

            </label>

            <!-- Search Button -->
            <button
                onclick="searchIssues()"
                class="btn bg-[#4A00FF] text-white border-none rounded-xl"
            >

                Search

            </button>
            <!-- New Issue btn -->
            <button
                class="btn bg-[#4A00FF] text-white border-none rounded-xl"
            >

                + New Issue

            </button>

        </div>

    </nav>

    <!-- hero section start  -->
    <section class="max-w-7xl mx-auto p-6 space-y-2">

        <div class="bg-white rounded-xl shadow-sm border p-5">

            <div class="flex gap-4">

                <!-- All -->
                <button
                    id="allBtn"
                    onclick="showAll()"
                    class="btn rounded-xl px-8"
                >
                    All
                </button>
                <!-- Open btn-->
                <button
                    id="openBtn"
                    onclick="showOpen()"
                    class="btn rounded-xl px-8"
                >
                    Open
                </button>

                <!-- Closed btn-->
                <button
                    id="closedBtn"
                    onclick="showClosed()"
                    class="btn rounded-xl px-8"
                >

                    Closed

                </button>

            </div>

        </div>

          <div class="bg-white rounded-2xl shadow-sm border p-6 flex justify-between items-center">

            <!-- Left -->
            <div>

                <div class="flex items-center gap-4">

                    <div class="w-14 h-14 rounded-full bg-purple-100 flex items-center justify-center">

                        <img src="../assets/Aperture.png" alt="">

                    </div>

                    <div>

                        <h2 class="text-2xl font-bold">

                            <span id="totalIssues">  0
                            </span>
                            Issues
                        </h2>
                        <p class="text-sm text-gray-500">

                            Track and manage your project issues

                        </p>

                    </div>

                </div>

            </div>

            <!-- Right -->
            <div class="flex gap-6">

                <!-- Open -->
                <div class="flex items-center gap-2">

                    <div class="w-3 h-3 rounded-full bg-green-500"></div>

                    <p class="text-sm">

                        Open

                    </p>

                </div>

                <!-- Closed -->
                <div class="flex items-center gap-2">

                    <div class="w-3 h-3 rounded-full bg-[#4A00FF]"></div>

                    <p class="text-sm">

                        Closed

                    </p>

                </div>

            </div>

        </div>

    <div
      id="issuesContainer"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-5"
    >

    </div>
</section>


<script src="allScript/homePage.js"></script>

</body>
</html>
