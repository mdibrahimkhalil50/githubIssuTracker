<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home Page</title>
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <!-- <script src="https://cdn.tailwindcss.com"></script> -->
   
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="/assets/social.png" type="image/x-icon">
    <!-- google font add -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- used font awesome icon -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
        font-family: "Outfit", sans-serif;
    }
</style>

</head>
<body style="">
    <section>
        <nav class="flex justify-between px-10 border-2 border-blue-500 items-center rounded-md">
            <div class="flex items-center p-5 gap-2">
               <img class="h-10 w-10" src="./assets/github-logo.png" alt="">
               <h1 class="font-bold">GitHub Issues Tracker</h1>
            </div>


            <div class="flex gap-4">
                    <!-- search function add  -->
<label class="input border border-[#E4E4E7] rounded-box">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="searchInput" type="search" required placeholder="Search Issues ...." />
</label>
<!-- search btn -->
 <button
        onclick="searchIssues()"
        class="btn btn-primary text-white border-none"
      >
        Search
      </button> 

<button  class="btn btn-primary font-bold">+ New Issue</button>
 </div>
</nav>
</section>
<!--  three btn parts -->
<section>
<div class="border-2 border-red-500 p-4 flex gap-3 max-w-5xl mx-auto mt-10 mb-4 rounded-lg">

<button id="allBtn" onclick="showAll()" class="btn btn-primary py-2 px-10">All</button>
<button id="openBtn" onclick="showOpen()" class="btn btn-primary py-2 px-10">Open</button>
<button id="closedBtn" onclick="showClosed()" class="btn btn-primary py-2 px-10">Closed</button>

</div>



<section class="border-2 border-teal-400 p-2 gap-3 max-w-5xl mx-auto rounded-lg">
<div class=" border-2 border-purple-500 rounded-xl p-5  flex justify-between items-center">

      <!-- Left -->
      <div>

        <div class="flex items-center gap-3">

          <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">

            <span >
              <img  src="./assets/Aperture.png" alt="">
            </span>

          </div>

          <div>

            <h2 class="font-semibold text-xl">
              <span id="totalIssues" class="text-2xl font-bold">00</span> Issues
            </h2>

            <p class="text-sm text-gray-500">
              Track and manage your project issues
            </p>

          </div>

        </div>

      </div>

      <!-- Right -->
      <div class="flex gap-5 text-sm">

        <div class="flex items-center gap-2">

          <div class="w-2 h-2 rounded-full bg-green-500"></div>

          <span>Open</span>

        </div>

        <div class="flex items-center gap-2">

          <div class="w-2 h-2 rounded-full bg-purple-500"></div>

          <span>Closed</span>

        </div>

      </div>

    </div>
</section>
<div
      id="issuesContainer"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-5"
    >

    </div>
</section>

<!-- api loading card design part -->


<script src="allScript/homePage.js"></script>


</body>
</html>
